query AllTranslations(
	$locale: SiteLocale = en
	$fallbackLocales: [SiteLocale!] = [en]
	$first: IntType = 100
	$skip: IntType = 0
) {
	allTranslations(
		locale: $locale
		fallbackLocales: $fallbackLocales
		first: $first
		skip: $skip
		orderBy: [value_ASC]
	) {
		key
		value
		page
	}
	_allTranslationsMeta(locale: $locale, fallbackLocales: $fallbackLocales) {
		count
	}
}
