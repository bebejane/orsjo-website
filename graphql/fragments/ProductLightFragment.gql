#import './ImageThumbnailFragment.gql'

fragment ProductLightFragment on ProductRecord {
	id
	title
	slug
	markAsNew
	shopifyId
	family {
		id
		name
	}
	categories {
		id
		name
		namePlural
	}
	image {
		...ImageThumbnailFragment
	}
	environmentImage {
		...ImageThumbnailFragment
	}
	designer {
		id
		name
		slug
	}
}
